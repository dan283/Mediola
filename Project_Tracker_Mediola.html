<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Mediola Worksheet Tracker</title>
  <style>
    :root{
      --bg:#eef4f8;
      --bg2:#e8f0f5;
      --panel:#ffffff;
      --panel2:#f7fbfd;
      --line: rgba(18,52,77,.12);
      --line2: rgba(18,52,77,.08);
      --text:#173246;
      --muted:#5f7a8d;
      --muted2:#7f97a8;
      --accent:#1f8aa7;
      --accent2:#38a8c7;
      --accentSoft:rgba(31,138,167,.10);
      --good:#1f9d63;
      --warn:#d7a126;
      --bad:#cf5f5f;
      --bluePill:#dff2f7;

      --r:16px;
      --r2:12px;
      --shadow: 0 16px 40px rgba(16,49,74,.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(900px 520px at 5% 0%, rgba(56,168,199,.10), transparent 60%),
        radial-gradient(700px 420px at 100% 0%, rgba(31,138,167,.08), transparent 58%),
        linear-gradient(180deg, var(--bg), var(--bg2));
    }

    *::-webkit-scrollbar{ width:10px; height:10px; }
    *::-webkit-scrollbar-track{ background: rgba(31,138,167,.06); border-radius: 999px; }
    *::-webkit-scrollbar-thumb{ background: rgba(31,138,167,.30); border-radius: 999px; border: 2px solid rgba(255,255,255,.8); }
    *::-webkit-scrollbar-thumb:hover{ background: rgba(31,138,167,.45); }

    header{
      position: sticky; top:0; z-index:20;
      background: rgba(255,255,255,.82);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--line);
    }
    .wrap{ max-width: 1700px; margin:0 auto; padding: 14px; }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:260px;
    }
    .brandLogo{
      width:160px;
      height:54px;
      display:flex;
      align-items:center;
    }
    .brandLogo img{
      display:block;
      max-width:100%;
      max-height:100%;
      object-fit:contain;
    }
    .brandText h1{
      margin:0;
      font-size:15px;
      font-weight:900;
      letter-spacing:.2px;
    }
    .brandText .sub{
      margin-top:3px;
      font-size:12px;
      color:var(--muted2);
    }

    .controls{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      display:flex;
      align-items:center;
      gap:8px;
      min-height:42px;
      padding:10px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.88);
      border:1px solid var(--line);
      box-shadow: 0 6px 16px rgba(16,49,74,.04);
    }
    .pill input, .pill select{
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:13px;
      min-width:0;
    }
    .pill input{ width:220px; }

    select, input[type="text"], input[type="date"], input[type="number"]{
      color:var(--text);
      background:#fff;
      border:1px solid var(--line);
      border-radius:10px;
      padding:9px 10px;
      outline:none;
      min-width:0;
    }
    select:focus, input[type="text"]:focus, input[type="date"]:focus, input[type="number"]:focus, textarea:focus{
      box-shadow: 0 0 0 3px rgba(31,138,167,.14);
      border-color: rgba(31,138,167,.38);
    }

    .btn{
      cursor:pointer;
      border-radius:999px;
      border:1px solid rgba(31,138,167,.18);
      padding:10px 13px;
      font-weight:800;
      color:#0f3147;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(233,247,251,.98));
      transition: transform .08s ease, filter .15s ease, box-shadow .15s ease;
      white-space:nowrap;
      box-shadow: 0 8px 20px rgba(16,49,74,.05);
    }
    .btn:hover{ filter: brightness(1.02); }
    .btn:active{ transform: translateY(1px); }
    .btn.primary{
      color:#fff;
      background: linear-gradient(180deg, var(--accent2), var(--accent));
      border-color: rgba(31,138,167,.45);
      box-shadow: 0 14px 28px rgba(31,138,167,.20);
    }
    .btn.ghost{
      background: rgba(255,255,255,.85);
    }
    .btn.danger{
      color:#fff;
      border-color: rgba(207,95,95,.28);
      background: linear-gradient(180deg, #e78383, #cf5f5f);
      box-shadow: 0 12px 24px rgba(207,95,95,.18);
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
      filter:none;
      transform:none;
    }

    main{ padding:14px; }
    .layout{
      max-width: 1700px;
      margin:0 auto;
      display:grid;
      grid-template-columns: 360px 1fr 430px;
      gap:12px;
      align-items:start;
      height: calc(100vh - 92px);
    }

    .panel{
      height:100%;
      min-height:0;
      background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(247,251,253,.98));
      border:1px solid var(--line);
      border-radius:var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    .panelHead{
      padding:12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid var(--line);
      background: linear-gradient(180deg, rgba(247,251,253,.98), rgba(255,255,255,.98));
    }
    .panelHead .title{
      font-size:12px;
      font-weight:900;
      letter-spacing:.35px;
      text-transform:uppercase;
      color:var(--muted);
    }

    .panelBody{
      padding:10px;
      height:100%;
      min-height:0;
    }

    .stack{
      display:flex;
      flex-direction:column;
      gap:10px;
      height:100%;
      min-height:0;
    }

    .block{
      background: rgba(255,255,255,.78);
      border:1px solid var(--line2);
      border-radius: var(--r2);
      overflow:hidden;
      min-height:0;
      display:flex;
      flex-direction:column;
    }
    .blockHead{
      padding:10px;
      font-size:12px;
      font-weight:900;
      color:var(--muted);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      border-bottom:1px solid var(--line2);
      background: rgba(223,242,247,.35);
    }
    .blockScroll{
      padding:8px;
      overflow:auto;
      min-height:0;
    }

    .worksheetItem{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(18,52,77,.08);
      background: rgba(255,255,255,.92);
      cursor:pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      margin-bottom:8px;
    }
    .worksheetItem:hover{ background: #fff; }
    .worksheetItem.selected{
      border-color: rgba(31,138,167,.55);
      box-shadow: 0 0 0 2px rgba(31,138,167,.12) inset, 0 14px 28px rgba(31,138,167,.08);
      background: rgba(223,242,247,.62);
    }

    .wicon{
      width:38px;
      height:38px;
      border-radius:12px;
      background: linear-gradient(180deg, #eff9fc, #dff2f7);
      border:1px solid rgba(31,138,167,.18);
      display:grid;
      place-items:center;
      color:var(--accent);
      font-weight:900;
      font-family:var(--mono);
      flex:0 0 auto;
    }

    .wmeta{ flex:1; min-width:0; }
    .nameRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      min-width:0;
    }
    .wname{
      font-weight:850;
      font-size:13px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .wsub{
      margin-top:4px;
      font-size:11px;
      color:var(--muted2);
      display:flex;
      gap:6px;
      flex-wrap:wrap;
    }
    .wbar{
      margin-top:8px;
      height:7px;
      background:#e8f1f5;
      border-radius:999px;
      overflow:hidden;
      border:1px solid rgba(18,52,77,.06);
    }
    .wbar > i{
      display:block;
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius:999px;
    }

    .ppct{
      font-size:12px;
      color:var(--muted2);
      font-family:var(--mono);
      padding-top:2px;
      flex:0 0 auto;
    }

    .taskRow{
      display:flex;
      gap:10px;
      align-items:center;
      padding:9px;
      border-radius:12px;
      border:1px solid rgba(18,52,77,.08);
      background: rgba(255,255,255,.94);
      cursor:pointer;
      margin-bottom:8px;
      user-select:none;
    }
    .taskRow.selected{
      border-color: rgba(31,138,167,.55);
      background: rgba(223,242,247,.68);
      box-shadow: 0 0 0 2px rgba(31,138,167,.10) inset;
    }

    .taskChk{
      width:16px;
      height:16px;
      accent-color: var(--accent);
      flex:0 0 auto;
    }

    .thumbMini{
      width:40px;
      height:30px;
      border-radius:10px;
      background: #f2f8fb;
      border:1px solid rgba(18,52,77,.08);
      overflow:hidden;
      flex:0 0 auto;
    }
    .thumbMini img{ width:100%; height:100%; object-fit:cover; display:block; }

    .tmeta{ flex:1; min-width:0; }
    .ttitle{
      font-weight:900;
      font-size:12.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tstage{
      font-size:11px;
      color:var(--muted2);
      margin-top:2px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .chip{
      font-size:11px;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(18,52,77,.10);
      background:#f4f8fa;
      color:var(--muted);
      font-weight:900;
      white-space:nowrap;
    }
    .chip.done{
      border-color: rgba(31,157,99,.24);
      background: rgba(31,157,99,.12);
      color:#176d47;
    }
    .chip.progress{
      border-color: rgba(215,161,38,.24);
      background: rgba(215,161,38,.14);
      color:#876315;
    }
    .chip.todo{
      border-color: rgba(18,52,77,.10);
      background:#f4f8fa;
      color:var(--muted);
    }

    .pillSmall{
      font-size:11px;
      font-weight:900;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(18,52,77,.10);
      background:#f5fafc;
      color:var(--muted);
      white-space:nowrap;
    }
    .pillSmall.stage{
      background: var(--bluePill);
      color:#0f5c74;
      border-color: rgba(31,138,167,.20);
    }

    .middle{ display:flex; flex-direction:column; min-height:0; }
    .middleTools{
      padding:10px;
      border-bottom:1px solid var(--line);
      background: rgba(247,251,253,.9);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .chipsRow{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    .filterChip{
      cursor:pointer;
      user-select:none;
      font-size:12px;
      font-weight:900;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(18,52,77,.10);
      background:#fff;
      color:var(--muted);
    }
    .filterChip.active{
      border-color: rgba(31,138,167,.32);
      background: rgba(223,242,247,.9);
      color:#0f5a71;
    }

    .gridScroll{ padding:10px; overflow:auto; min-height:0; }
    .cards{
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap:10px;
    }
    .card{
      border-radius:var(--r2);
      border:1px solid rgba(18,52,77,.10);
      background:#fff;
      overflow:hidden;
      cursor:pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      min-height:315px;
      display:flex;
      flex-direction:column;
      box-shadow: 0 10px 24px rgba(16,49,74,.04);
    }
    .card:hover{ background:#fff; }
    .card.selected{
      border-color: rgba(31,138,167,.55);
      box-shadow: 0 0 0 2px rgba(31,138,167,.10) inset, 0 16px 28px rgba(31,138,167,.08);
      background: #fcfeff;
    }
    .cardHead{
      padding:10px 10px 8px 10px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:8px;
    }
    .stagePill{
      font-size:11px;
      font-weight:900;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(31,138,167,.18);
      background: var(--bluePill);
      color:#0f5c74;
      max-width:74%;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .statusDot{
      width:10px;
      height:10px;
      border-radius:999px;
      border:1px solid rgba(18,52,77,.16);
      margin-top:4px;
      flex:0 0 auto;
    }
    .statusDot.done{ background: var(--good); border-color: rgba(31,157,99,.30); }
    .statusDot.progress{ background: var(--warn); border-color: rgba(215,161,38,.28); }
    .statusDot.todo{ background: rgba(18,52,77,.18); border-color: rgba(18,52,77,.18); }

    .cardTitle{
      padding: 0 10px 6px 10px;
      font-weight:900;
      font-size:14px;
      line-height:1.2;
      min-height:34px;
    }
    .cardMeta{
      padding:0 10px 8px 10px;
      color:var(--muted2);
      font-size:11px;
      display:flex;
      flex-wrap:wrap;
      gap:6px;
    }
    .cardImg{
      margin:0 10px;
      border-radius:12px;
      overflow:hidden;
      border:1px solid rgba(18,52,77,.10);
      background: #eff7fb;
      height:130px;
      flex:0 0 auto;
    }
    .cardImg img{ width:100%; height:100%; object-fit:cover; display:block; }

    .cardDesc{
      padding:10px;
      color:var(--muted);
      font-size:12px;
      line-height:1.38;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:52px;
    }

    .cardFoot{
      margin-top:auto;
      padding:10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-top:1px solid rgba(18,52,77,.06);
    }
    .miniBar{
      flex:1;
      height:7px;
      background:#e8f1f5;
      border:1px solid rgba(18,52,77,.06);
      border-radius:999px;
      overflow:hidden;
    }
    .miniBar > i{
      display:block;
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius:999px;
    }
    .pctMini{
      font-family:var(--mono);
      color:var(--muted2);
      font-size:12px;
      flex:0 0 auto;
    }

    .right{ display:flex; flex-direction:column; min-height:0; }
    .detailScroll{ padding:12px; overflow:auto; min-height:0; }

    .detailTitle{
      font-weight:950;
      font-size:17px;
      line-height:1.2;
      margin:0 0 6px 0;
    }

    .metaLine{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
      color:var(--muted2);
      font-size:12px;
      margin-bottom:10px;
    }

    .section{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(18,52,77,.08);
    }
    .section h3{
      margin:0 0 8px 0;
      font-size:12px;
      letter-spacing:.35px;
      text-transform:uppercase;
      color:var(--muted);
    }

    .dropZone{
      border-radius:14px;
      border:1px solid rgba(18,52,77,.10);
      background:#f2f8fb;
      overflow:hidden;
      position:relative;
    }
    .dropZone.dragover{
      border-color: rgba(31,138,167,.55);
      box-shadow: 0 0 0 3px rgba(31,138,167,.12) inset;
      background: rgba(223,242,247,.9);
    }
    .imgHero{ height:220px; }
    .imgHero img{ width:100%; height:100%; object-fit:cover; display:block; }
    .dropHint{
      position:absolute;
      inset:auto 10px 10px 10px;
      padding:8px 10px;
      border-radius:12px;
      border:1px solid rgba(18,52,77,.10);
      background: rgba(255,255,255,.88);
      color:var(--muted);
      font-size:12px;
      pointer-events:none;
    }

    .thumbs{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(5, 1fr);
      gap:8px;
    }
    .thumb{
      border-radius:12px;
      overflow:hidden;
      border:1px solid rgba(18,52,77,.10);
      background:#f2f8fb;
      height:64px;
      cursor:pointer;
    }
    .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }

    textarea{
      width:100%;
      min-height:110px;
      resize:vertical;
      border-radius:12px;
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      padding:10px;
      outline:none;
      font-size:13px;
      line-height:1.4;
    }

    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .fileList{
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .fileItem{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(18,52,77,.10);
      background: rgba(255,255,255,.94);
    }
    .fileLeft{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .ficon{
      width:30px;
      height:30px;
      border-radius:10px;
      background: var(--bluePill);
      border:1px solid rgba(31,138,167,.18);
      display:grid;
      place-items:center;
      color:#0f5c74;
      flex:0 0 auto;
    }
    .fname{
      font-weight:850;
      font-size:12.5px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .furl{
      font-size:12px;
      color:var(--muted2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width:220px;
    }
    a{ color: var(--accent); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .empty{
      padding:14px;
      border-radius:14px;
      border:1px dashed rgba(18,52,77,.18);
      background: rgba(255,255,255,.65);
      color:var(--muted);
      font-size:13px;
      line-height:1.38;
    }

    .iconBtn{
      cursor:pointer;
      border-radius:10px;
      border:1px solid rgba(18,52,77,.10);
      background:#fff;
      color:var(--muted);
      padding:6px 8px;
      font-weight:900;
      line-height:1;
      flex:0 0 auto;
    }

    .modalBackdrop{
      position:fixed;
      inset:0;
      background: rgba(11,29,42,.42);
      display:none;
      align-items:center;
      justify-content:center;
      padding:14px;
      z-index:999;
    }
    .modalBackdrop.show{ display:flex; }
    .modal{
      width:min(760px, 96vw);
      max-height:min(86vh, 920px);
      overflow:auto;
      background: linear-gradient(180deg, #ffffff, #f7fbfd);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow: 0 28px 80px rgba(16,49,74,.18);
      padding:12px;
    }
    .modalHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom:1px solid var(--line);
      padding-bottom:10px;
      margin-bottom:10px;
    }
    .modalTitle{ font-weight:950; }
    .presetGrid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap:8px;
    }
    .presetItem{
      border:1px solid rgba(18,52,77,.10);
      background:#fff;
      border-radius:12px;
      padding:10px;
      display:flex;
      gap:10px;
      align-items:center;
    }
    .presetItem input{ accent-color: var(--accent); width:16px; height:16px; }
    .presetName{ font-weight:850; font-size:13px; }
    .modalFoot{
      margin-top:10px;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
      border-top:1px solid var(--line);
      padding-top:10px;
    }
    .inputPill{
      display:flex;
      gap:8px;
      align-items:center;
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:8px 10px;
    }
    .inputPill input{
      background:transparent;
      border:none;
      outline:none;
      color:var(--text);
      width:220px;
    }

<script>
(() => {
  const STORAGE_KEY = "mediola_tracker_v1";
  const PRESET_KEY = "mediola_presets_v1";

  const STATUS = ["Not Started","In Progress","Done"];
  const SERVICE_TYPES = [
    "Inspection",
    "Cleaning / Decontamination",
    "Sharpening",
    "Adjustment / Alignment",
    "Parts Replacement",
    "Calibration",
    "Lubrication",
    "Electrical Safety Test",
    "Functional Test",
    "Final QA / Handover"
  ];

  const DEFAULT_CLIENT_ID = "client_default";
  const ALL_CLIENT_ID = "client_all";

  const DEFAULT_OWNERS = [
    "Szvacsek Ferenc II.",
    "Görbics Tamás III.",
    "Jandó Csaba IV.",
    "Árvai Zoltán V.",
    "Unassigned"
  ];

  const DEFAULT_TASK_LIST = [
    "Incoming inspection",
    "Cleaning / decontamination",
    "Sharpening",
    "Adjustment / alignment",
    "Parts replacement",
    "Calibration",
    "Lubrication",
    "Functional test",
    "Electrical safety test",
    "Final QA / handover"
  ];

  const IMG = {
    quality: 0.82,
    maxEdge: 2048,
    mime: "image/jpeg"
  };

  const el = (id) => document.getElementById(id);
  const uid = (prefix="id") => prefix + "_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  const clamp = (n,min,max) => Math.max(min, Math.min(max,n));
  const norm = (s) => String(s || "").trim().toLowerCase();

  const state = {
    data: null,
    presets: {},
    selectedClientId: DEFAULT_CLIENT_ID,
    selectedWorksheetId: null,
    selectedTaskId: null,
    statusFilter: "All",
    sortBy: "order",
    query: "",
    scope: "worksheet"
  };

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, m => ({
      "&":"&amp;",
      "<":"&lt;",
      ">":"&gt;",
      '"':"&quot;",
      "'":"&#39;"
    }[m]));
  }

  function placeholderSvg(label){
    const txt = encodeURIComponent(label);
    const svg =
`<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fbfd"/>
      <stop offset="1" stop-color="#dff2f7"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#g)"/>
  <rect x="34" y="34" width="832" height="452" rx="30" fill="rgba(255,255,255,0.8)" stroke="rgba(31,138,167,0.16)"/>
  <text x="72" y="120" font-family="system-ui,Segoe UI,Arial" font-size="38" font-weight="700" fill="#1f8aa7">${txt}</text>
  <text x="72" y="176" font-family="system-ui,Segoe UI,Arial" font-size="20" fill="#5f7a8d">Medical equipment task image / service photo</text>
  <circle cx="790" cy="130" r="50" fill="rgba(31,138,167,0.12)" stroke="rgba(31,138,167,0.20)"/>
  <path d="M790 104v52M764 130h52" stroke="#1f8aa7" stroke-width="8" stroke-linecap="round"/>
</svg>`;
    return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data));
    localStorage.setItem(PRESET_KEY, JSON.stringify(state.presets));
  }

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return migrate(JSON.parse(raw));
    }catch(_){}
    return migrate(defaultData());
  }

  function loadPresets(){
    try{
      const raw = localStorage.getItem(PRESET_KEY);
      if(raw){
        state.presets = JSON.parse(raw);
        return;
      }
    }catch(_){}
    state.presets = {
      "Default service workflow": DEFAULT_TASK_LIST.slice(),
      "Scissor sharpening": [
        "Incoming inspection",
        "Cleaning / decontamination",
        "Sharpening",
        "Adjustment / alignment",
        "Functional test",
        "Final QA / handover"
      ],
      "Electrosurgery repair": [
        "Incoming inspection",
        "Cleaning / decontamination",
        "Parts replacement",
        "Calibration",
        "Electrical safety test",
        "Functional test",
        "Final QA / handover"
      ]
    };
  }

  function defaultData(){
    const clients = [
      { id: DEFAULT_CLIENT_ID, name: "Mediola / Internal" },
      { id: uid("client"), name: "SE SZÍV" }
    ];

    const worksheet = {
      id: uid("ws"),
      clientId: clients[1].id,
      title: "Worksheet 9175",
      worksheetNo: "9175",
      worksheetDate: "2025-01-09",
      referenceNo: "",
      contactPerson: "",
      notes: "Service worksheet based on current intake form. Adjust equipment names and quantities as needed.",
      progress: 0
    };

    const mkTask = (equipmentName, serviceType, owner, status, progress, equipmentCode, shortDesc, order) => ({
      id: uid("task"),
      worksheetId: worksheet.id,
      title: equipmentName,
      equipmentCode,
      serviceType,
      owner,
      qty: 1,
      status,
      progress,
      shortDesc,
      description: shortDesc + "\\n\\nWork performed:\\n- \\n\\nFindings:\\n- \\n\\nParts used:\\n- \\n\\nFinal note:\\n- ",
      images: [placeholderSvg(serviceType)],
      files: [],
      heroIndex: 0,
      order,
      updatedAt: Date.now() - ((6 - order) * 1000 * 60 * 10)
    });

    const tasks = [
      mkTask("Arcoscope SK 4”", "Inspection", "Szvacsek Ferenc II.", "In Progress", 35, "10-0110", "Incoming inspection and identification of wear / service needs.", 0),
      mkTask("OCB 160 instrument", "Adjustment / Alignment", "Görbics Tamás III.", "Not Started", 0, "BC5822", "Mechanical alignment and functional check.", 1),
      mkTask("BET 230 SK 4”", "Parts Replacement", "Jandó Csaba IV.", "In Progress", 55, "26-0107", "Part replacement and reassembly.", 2),
      mkTask("Micro tip FMS66E", "Calibration", "Árvai Zoltán V.", "Not Started", 0, "03-0195", "Calibration and post-service function verification.", 3),
      mkTask("FMS66R", "Cleaning / Decontamination", "Szvacsek Ferenc II.", "Done", 100, "4393097", "Cleaning completed, ready for final signoff.", 4),
      mkTask("General instrument batch", "Sharpening", "Unassigned", "Not Started", 0, "9175-06", "Sharpen cutting edges where applicable, then test movement and bite.", 5)
    ];

    return { clients, worksheets: [worksheet], tasks, owners: DEFAULT_OWNERS.slice() };
  }

  function migrate(d){
    if(!d || typeof d !== "object") d = defaultData();
    d.clients = Array.isArray(d.clients) ? d.clients : [{ id: DEFAULT_CLIENT_ID, name: "Mediola / Internal" }];
    if(!d.clients.find(c => c.id === DEFAULT_CLIENT_ID)){
      d.clients.unshift({ id: DEFAULT_CLIENT_ID, name: "Mediola / Internal" });
    }
    d.worksheets = Array.isArray(d.worksheets) ? d.worksheets : [];
    d.tasks = Array.isArray(d.tasks) ? d.tasks : [];
    d.owners = Array.isArray(d.owners) && d.owners.length ? d.owners : DEFAULT_OWNERS.slice();

    d.worksheets.forEach(w => {
      if(!w.id) w.id = uid("ws");
      if(!w.clientId) w.clientId = DEFAULT_CLIENT_ID;
      if(!w.title) w.title = "Worksheet";
      if(!w.worksheetNo) w.worksheetNo = "";
      if(!w.worksheetDate) w.worksheetDate = "";
      if(!w.referenceNo) w.referenceNo = "";
      if(!w.contactPerson) w.contactPerson = "";
      if(!w.notes) w.notes = "";
    });

    d.tasks.forEach((t, i) => {
      if(!t.id) t.id = uid("task");
      if(!t.worksheetId) t.worksheetId = d.worksheets[0]?.id || "";
      if(!t.title) t.title = "Equipment task";
      if(!t.equipmentCode) t.equipmentCode = "";
      if(!t.serviceType) t.serviceType = "Inspection";
      if(!t.owner) t.owner = "Unassigned";
      if(typeof t.qty !== "number") t.qty = 1;
      if(!t.status) t.status = "Not Started";
      if(typeof t.progress !== "number") t.progress = 0;
      if(!t.shortDesc) t.shortDesc = "";
      if(!t.description) t.description = "";
      if(!Array.isArray(t.images)) t.images = [];
      if(!Array.isArray(t.files)) t.files = [];
      if(typeof t.heroIndex !== "number") t.heroIndex = 0;
      if(typeof t.order !== "number") t.order = i;
      if(typeof t.updatedAt !== "number") t.updatedAt = Date.now();
    });

    normalizeOrder(d);
    return d;
  }

  function normalizeOrder(d){
    const byWs = new Map();
    d.tasks.forEach(t => {
      if(!byWs.has(t.worksheetId)) byWs.set(t.worksheetId, []);
      byWs.get(t.worksheetId).push(t);
    });
    byWs.forEach(arr => {
      arr.sort((a,b) => (a.order || 0) - (b.order || 0) || (b.updatedAt || 0) - (a.updatedAt || 0));
      arr.forEach((t,i) => t.order = i);
    });
  }

  function computeWorksheetProgress(worksheetId){
    const arr = state.data.tasks.filter(t => t.worksheetId === worksheetId);
    if(!arr.length) return 0;
    return Math.round(arr.reduce((s,t) => s + (Number(t.progress) || 0), 0) / arr.length);
  }

  function currentClientWorksheets(){
    if(state.selectedClientId === ALL_CLIENT_ID) return state.data.worksheets.slice();
    return state.data.worksheets.filter(w => w.clientId === state.selectedClientId);
  }

  function getCurrentWorksheetTasks(){
    if(!state.selectedWorksheetId) return [];
    return state.data.tasks
      .filter(t => t.worksheetId === state.selectedWorksheetId)
      .slice()
      .sort((a,b) => (a.order || 0) - (b.order || 0));
  }

  function getSelectedTask(){
    return state.data.tasks.find(t => t.id === state.selectedTaskId) || null;
  }

  function ensureSelections(){
    const visible = currentClientWorksheets();
    if(!visible.length){
      state.selectedWorksheetId = null;
      state.selectedTaskId = null;
      return;
    }
    if(!visible.find(w => w.id === state.selectedWorksheetId)){
      state.selectedWorksheetId = visible[0].id;
    }
    const tasks = getCurrentWorksheetTasks();
    if(!tasks.length){
      state.selectedTaskId = null;
      return;
    }
    if(!tasks.find(t => t.id === state.selectedTaskId)){
      state.selectedTaskId = tasks[0].id;
    }
  }

  function buildClientSelect(){
    const sel = el("clientSel");
    sel.innerHTML = "";
    sel.appendChild(new Option("All clients", ALL_CLIENT_ID));
    state.data.clients.forEach(c => sel.appendChild(new Option(c.name, c.id)));
    sel.appendChild(new Option("────────", "__sep__"));
    sel.appendChild(new Option("➕ New client…", "__new__"));
    sel.appendChild(new Option("✎ Rename selected…", "__rename__"));
    sel.appendChild(new Option("🗑 Delete selected…", "__delete__"));
    sel.value = state.selectedClientId;

    sel.onchange = () => {
      const v = sel.value;

      if(v === "__new__"){
        const name = prompt("New client name?");
        if(name){
          const c = { id: uid("client"), name: name.trim() };
          state.data.clients.push(c);
          state.selectedClientId = c.id;
          save();
        }
        buildClientSelect();
        ensureSelections();
        renderAll();
        return;
      }

      if(v === "__rename__"){
        if(state.selectedClientId === ALL_CLIENT_ID){
          alert("Select a specific client first.");
        } else {
          const c = state.data.clients.find(x => x.id === state.selectedClientId);
          if(c){
            const name = prompt("Rename client:", c.name);
            if(name){
              c.name = name.trim();
              save();
            }
          }
        }
        buildClientSelect();
        renderAll();
        return;
      }

      if(v === "__delete__"){
        if(state.selectedClientId === ALL_CLIENT_ID || state.selectedClientId === DEFAULT_CLIENT_ID){
          alert("This client cannot be deleted.");
        } else {
          const c = state.data.clients.find(x => x.id === state.selectedClientId);
          const worksheets = state.data.worksheets.filter(w => w.clientId === c.id);
          const ids = new Set(worksheets.map(w => w.id));
          const taskCount = state.data.tasks.filter(t => ids.has(t.worksheetId)).length;

          if(confirm(`Delete client "${c.name}"?\\nThis will also delete ${worksheets.length} worksheet(s) and ${taskCount} task(s).`)){
            state.data.tasks = state.data.tasks.filter(t => !ids.has(t.worksheetId));
            state.data.worksheets = state.data.worksheets.filter(w => w.clientId !== c.id);
            state.data.clients = state.data.clients.filter(x => x.id !== c.id);
            state.selectedClientId = DEFAULT_CLIENT_ID;
            save();
          }
        }
        buildClientSelect();
        ensureSelections();
        renderAll();
        return;
      }

      state.selectedClientId = v;
      ensureSelections();
      renderAll();
    };
  }

  function buildScopeSelect(){
    const sel = el("scopeSel");
    sel.innerHTML = "";
    sel.appendChild(new Option("Selected worksheet", "worksheet"));
    sel.appendChild(new Option("This client", "client"));
    sel.appendChild(new Option("All clients", "all"));
    sel.value = state.scope;
    sel.onchange = () => {
      state.scope = sel.value;
      renderCards();
    };
  }

  function buildStatusFilters(){
    const wrap = el("statusFilters");
    wrap.innerHTML = "";
    ["All", ...STATUS].forEach(s => {
      const b = document.createElement("div");
      b.className = "filterChip" + (state.statusFilter === s ? " active" : "");
      b.textContent = s;
      b.onclick = () => {
        state.statusFilter = s;
        buildStatusFilters();
        renderCards();
      };
      wrap.appendChild(b);
    });
  }

  function taskMatchesFilters(t){
    if(state.statusFilter !== "All" && t.status !== state.statusFilter) return false;

    const q = norm(state.query);
    if(q){
      const hay = norm([
        t.title,
        t.equipmentCode,
        t.serviceType,
        t.owner,
        t.shortDesc,
        t.description
      ].join(" "));
      if(!hay.includes(q)) return false;
    }

    const worksheet = state.data.worksheets.find(w => w.id === t.worksheetId);
    if(!worksheet) return false;

    if(state.scope === "worksheet") return t.worksheetId === state.selectedWorksheetId;
    if(state.scope === "client"){
      return state.selectedClientId === ALL_CLIENT_ID || worksheet.clientId === state.selectedClientId;
    }
    return true;
  }

  function sortedTasksForGrid(){
    const tasks = state.data.tasks.filter(taskMatchesFilters);

    switch(state.sortBy){
      case "updated":
        tasks.sort((a,b) => (b.updatedAt || 0) - (a.updatedAt || 0));
        break;
      case "service":
        tasks.sort((a,b) => (a.serviceType || "").localeCompare(b.serviceType || ""));
        break;
      case "owner":
        tasks.sort((a,b) => (a.owner || "").localeCompare(b.owner || ""));
        break;
      case "status":
        tasks.sort((a,b) => STATUS.indexOf(a.status) - STATUS.indexOf(b.status));
        break;
      case "title":
        tasks.sort((a,b) => (a.title || "").localeCompare(b.title || ""));
        break;
      default:
        tasks.sort((a,b) => {
          if(a.worksheetId === b.worksheetId) return (a.order || 0) - (b.order || 0);
          return (b.updatedAt || 0) - (a.updatedAt || 0);
        });
    }
    return tasks;
  }

  function statusToChipClass(s){
    if(s === "Done") return "done";
    if(s === "In Progress") return "progress";
    return "todo";
  }

  function statusToDotClass(s){
    if(s === "Done") return "done";
    if(s === "In Progress") return "progress";
    return "todo";
  }

  function renderWorksheets(){
    const list = el("worksheetsList");
    list.innerHTML = "";
    const worksheets = currentClientWorksheets();
    el("worksheetCount").textContent = worksheets.length;

    if(!worksheets.length){
      list.innerHTML = `<div class="empty">No worksheets yet. Create a new worksheet for a client.</div>`;
      return;
    }

    worksheets.forEach((w, idx) => {
      const item = document.createElement("div");
      item.className = "worksheetItem" + (w.id === state.selectedWorksheetId ? " selected" : "");
      item.onclick = () => {
        state.selectedWorksheetId = w.id;
        const tasks = getCurrentWorksheetTasks();
        state.selectedTaskId = tasks[0]?.id || null;
        renderAll();
        showPanel("mid");
      };

      const icon = document.createElement("div");
      icon.className = "wicon";
      icon.textContent = idx + 1;

      const meta = document.createElement("div");
      meta.className = "wmeta";

      const nameRow = document.createElement("div");
      nameRow.className = "nameRow";

      const name = document.createElement("div");
      name.className = "wname";
      name.textContent = w.title;

      const editBtn = document.createElement("button");
      editBtn.className = "iconBtn";
      editBtn.textContent = "✎";
      editBtn.title = "Edit worksheet header";
      editBtn.onclick = (e) => {
        e.stopPropagation();
        editWorksheetHeader(w);
      };

      nameRow.append(name, editBtn);

      const sub = document.createElement("div");
      sub.className = "wsub";
      const client = state.data.clients.find(c => c.id === w.clientId);
      sub.innerHTML = `
        <span>Client: ${escapeHtml(client?.name || "—")}</span>
        <span>•</span>
        <span>No: ${escapeHtml(w.worksheetNo || "—")}</span>
        <span>•</span>
        <span>Date: ${escapeHtml(w.worksheetDate || "—")}</span>
      `;

      const bar = document.createElement("div");
      bar.className = "wbar";
      const fill = document.createElement("i");
      const p = computeWorksheetProgress(w.id);
      fill.style.width = p + "%";
      bar.appendChild(fill);

      const pct = document.createElement("div");
      pct.className = "ppct";
      pct.textContent = p + "%";

      meta.append(nameRow, sub, bar);
      item.append(icon, meta, pct);
      list.appendChild(item);
    });
  }

  function renderTasksQuick(){
    const list = el("tasksQuick");
    list.innerHTML = "";

    const tasks = getCurrentWorksheetTasks();
    el("taskCount").textContent = tasks.length;

    if(!state.selectedWorksheetId){
      list.innerHTML = `<div class="empty">No worksheet selected.</div>`;
      return;
    }
    if(!tasks.length){
      list.innerHTML = `<div class="empty">This worksheet has no tasks yet.</div>`;
      return;
    }

    tasks.forEach(t => {
      const row = document.createElement("div");

    if(t.includes("sharpen")) return "Sharpening";

    if(t.includes("electrical")) return "Electrical Safety Test";
    if(t.includes("test")) return "Functional Test";
    if(t.includes("replace")) return "Parts Replacement";

    if(!worksheetId) return;
    const existing = new Set(state.data.tasks.filter(t => t.worksheetId === worksheetId).map(t => norm(t.title)));
    let order = getCurrentWorksheetTasks().length;

    titles.forEach(title => {
      const name = String(title || "").trim();

      if(skipDuplicates && existing.has(norm(name))) return;
      existing.add(norm(name));

      state.data.tasks.push({
        id: uid("task"),
        worksheetId,
        title: name,
        equipmentCode: "",
        serviceType: inferServiceType(name),
        owner: "Unassigned",
        qty: 1,
        status: "Not Started",
        progress: 0,
        shortDesc: "",
        description: "",
        images: [placeholderSvg(inferServiceType(name))],
        files: [],
        heroIndex: 0,
        order: order++,
        updatedAt: Date.now()
      });
    });

    normalizeOrder(state.data);
    save();
  }

  function fileToDataURLFallback(file){
    return new Promise((resolve, reject) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.onerror = reject;
      r.readAsDataURL(file);
    });
  }

  function loadImageFromFile(file){
    return new Promise((resolve, reject) => {
      const url = URL.createObjectURL(file);
      const img = new Image();
      img.onload = () => {
        URL.revokeObjectURL(url);
        resolve(img);
      };
      img.onerror = reject;
      img.src = url;
    });
  }

  async function compressImageFileToJpegDataUrl(file, {maxEdge, quality, mime}){
    const img = await loadImageFromFile(file);
    const w = img.naturalWidth || img.width;
    const h = img.naturalHeight || img.height;
    const scale = Math.min(1, maxEdge / Math.max(w,h));
    const outW = Math.max(1, Math.round(w * scale));
    const outH = Math.max(1, Math.round(h * scale));

    const canvas = document.createElement("canvas");
    canvas.width = outW;
    canvas.height = outH;

    const ctx = canvas.getContext("2d", { alpha:false });
    ctx.fillStyle = "#ffffff";
    ctx.fillRect(0,0,outW,outH);
    ctx.drawImage(img, 0, 0, outW, outH);

    return canvas.toDataURL(mime, quality);
  }

  async function addImagesToTask(task, files){
    const imgs = Array.from(files || []).filter(f => f.type && f.type.startsWith("image/"));
    if(!imgs.length) return;

    const urls = [];
    for(const f of imgs){
      try{
        urls.push(await compressImageFileToJpegDataUrl(f, IMG));
      }catch(_){
        urls.push(await fileToDataURLFallback(f));
      }
    }

    task.images = urls.concat(task.images || []);
    task.heroIndex = 0;
    task.updatedAt = Date.now();
    save();
    renderAll();
  }

  function attachDropZoneHandlers(zoneEl, task){
    if(!zoneEl) return;
    const stop = (e) => {
      e.preventDefault();
      e.stopPropagation();
    };
    zoneEl.addEventListener("dragenter", (e) => { stop(e); zoneEl.classList.add("dragover"); });
    zoneEl.addEventListener("dragover", (e) => { stop(e); zoneEl.classList.add("dragover"); });
    zoneEl.addEventListener("dragleave", (e) => { stop(e); zoneEl.classList.remove("dragover"); });
    zoneEl.addEventListener("drop", async (e) => {
      stop(e);
      zoneEl.classList.remove("dragover");
      if(e.dataTransfer?.files?.length) await addImagesToTask(task, e.dataTransfer.files);
    });
  }

    if(!confirm(`Delete worksheet "${w.title}" and its ${count} task(s)?`)) return;

    state.data.tasks = state.data.tasks.filter(t => t.worksheetId !== w.id);
    state.data.worksheets = state.data.worksheets.filter(x => x.id !== w.id);
    state.selectedWorksheetId = currentClientWorksheets()[0]?.id || null;
    state.selectedTaskId = getCurrentWorksheetTasks()[0]?.id || null;
    save();
    renderAll();
  };

  el("btnNewTask").onclick = () => {
    if(!state.selectedWorksheetId) return alert("Select a worksheet first.");
    const title = prompt("Equipment / task name?");
    if(!title) return;

    const t = {
      id: uid("task"),
      worksheetId: state.selectedWorksheetId,
      title: title.trim(),
      equipmentCode: "",
      serviceType: "Inspection",
      owner: "Unassigned",
      qty: 1,
      status: "Not Started",
      progress: 0,
      shortDesc: "",
      description: "",
      images: [placeholderSvg("Inspection")],
      files: [],
      heroIndex: 0,
      order: getCurrentWorksheetTasks().length,
      updatedAt: Date.now()
    };

    state.data.tasks.push(t);
    normalizeOrder(state.data);
    state.selectedTaskId = t.id;
    save();
    renderAll();
    showPanel("right");
  };

  el("btnDuplicate").onclick = () => {
    const t = getSelectedTask();
    if(!t) return;
    const copy = JSON.parse(JSON.stringify(t));
    copy.id = uid("task");
    copy.title = t.title + " (copy)";
    copy.order = getCurrentWorksheetTasks().length;
    copy.updatedAt = Date.now();
    state.data.tasks.push(copy);
    normalizeOrder(state.data);
    state.selectedTaskId = copy.id;
    save();
    renderAll();
  };

  el("btnDeleteTask").onclick = () => {
    const t = getSelectedTask();
    if(!t) return;
    if(!confirm("Delete this task?")) return;
    state.data.tasks = state.data.tasks.filter(x => x.id !== t.id);
    state.selectedTaskId = getCurrentWorksheetTasks()[0]?.id || null;
    save();
    renderAll();
  };

  el("btnExport").onclick = () => {
    const blob = new Blob([JSON.stringify(state.data, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "mediola-worksheet-tracker.json";
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };

  el("btnImport").onclick = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = "application/json";
    input.onchange = async () => {
      const file = input.files?.[0];
      if(!file) return;
      try{
        const text = await file.text();
        state.data = migrate(JSON.parse(text));
        ensureSelections();
        save();
        buildClientSelect();
        renderAll();
      }catch(e){
        alert("Import failed.");
      }
    };
    input.click();
  };

  el("btnReset").onclick = () => {
    if(!confirm("Reset all local tracker data?")) return;
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(PRESET_KEY);
    state.data = migrate(defaultData());
    loadPresets();
    state.selectedClientId = DEFAULT_CLIENT_ID;
    ensureSelections();
    save();
    buildClientSelect();
    buildScopeSelect();
    buildStatusFilters();
    renderAll();
  };

  el("q").addEventListener("input", (e) => {
    state.query = e.target.value || "";
    renderCards();
  });

  el("sortBy").addEventListener("change", (e) => {
    state.sortBy = e.target.value;
    renderCards();
  });

  el("btnOpenPresets").onclick = () => {
    if(!state.selectedWorksheetId){
      alert("Select a worksheet first.");
      return;
    }
    const base = state.presets["Default service workflow"] || DEFAULT_TASK_LIST;
    renderPresetGrid(new Set(base));
    el("presetName").value = "Default service workflow";
    openPresetModal();
  };

  el("btnClosePreset").onclick = closePresetModal;
  el("presetModal").addEventListener("click", (e) => {
    if(e.target === el("presetModal")) closePresetModal();
  });

  el("btnPresetAll").onclick = () => {
    el("presetGrid").querySelectorAll("input[type=checkbox]").forEach(x => x.checked = true);
  };
  el("btnPresetNone").onclick = () => {
    el("presetGrid").querySelectorAll("input[type=checkbox]").forEach(x => x.checked = false);
  };

  el("btnAddTaskToList").onclick = () => {
    const name = prompt("Add service step:");
    if(!name) return;
    const key = "Default service workflow";
    state.presets[key] = state.presets[key] || DEFAULT_TASK_LIST.slice();
    if(!state.presets[key].some(x => norm(x) === norm(name))){
      state.presets[key].push(name.trim());
      localStorage.setItem(PRESET_KEY, JSON.stringify(state.presets));
    }
    renderPresetGrid();
  };

  el("btnRemoveCheckedFromList").onclick = () => {
    const checked = new Set(getCheckedPresetItems().map(norm));
    if(!checked.size) return;
    Object.keys(state.presets).forEach(k => {
      state.presets[k] = (state.presets[k] || []).filter(x => !checked.has(norm(x)));
    });
    localStorage.setItem(PRESET_KEY, JSON.stringify(state.presets));
    renderPresetGrid();
  };

  el("btnCreateFromChecks").onclick = async () => {
    const titles = getCheckedPresetItems();
    if(!titles.length) return alert("Select at least one service step.");
    await createTasksFromTitles(state.selectedWorksheetId, titles, el("chkSkipDupTasks").checked);
    state.selectedTaskId = getCurrentWorksheetTasks()[0]?.id || null;
    renderAll();
    closePresetModal();
  };

  el("btnSavePreset").onclick = () => {
    const name = el("presetName").value.trim();
    if(!name) return alert("Enter a preset name.");
    const titles = getCheckedPresetItems();
    if(!titles.length) return alert("Select at least one step.");
    state.presets[name] = titles.slice();
    localStorage.setItem(PRESET_KEY, JSON.stringify(state.presets));
    alert("Preset saved.");
  };

  el("btnLoadPreset").onclick = () => {
    const names = Object.keys(state.presets);
    if(!names.length) return alert("No presets saved.");
    const pick = prompt("Preset name to load:\\n\\n" + names.join("\\n"), names[0]);
    if(pick === null) return;
    const key = names.find(n => norm(n) === norm(pick));
    if(!key) return alert("Preset not found.");
    el("presetName").value = key;
    renderPresetGrid(new Set(state.presets[key]));
  };

  el("btnDeletePreset").onclick = () => {
    const names = Object.keys(state.presets);
    if(!names.length) return alert("No presets saved.");
    const pick = prompt("Preset name to delete:\\n\\n" + names.join("\\n"), names[0]);
    if(pick === null) return;
    const key = names.find(n => norm(n) === norm(pick));
    if(!key) return alert("Preset not found.");
    delete state.presets[key];
    localStorage.setItem(PRESET_KEY, JSON.stringify(state.presets));
    renderPresetGrid();
  };

  el("btnShowLeft").onclick = () => showPanel("left");
  el("btnShowMid").onclick = () => showPanel("mid");
  el("btnShowRight").onclick = () => showPanel("right");

  state.data = load();
  loadPresets();
  ensureSelections();
  state.selectedClientId = state.data.clients.find(c => c.id === state.selectedClientId) ? state.selectedClientId : ALL_CLIENT_ID;
  buildClientSelect();
  buildScopeSelect();
  buildStatusFilters();
  renderAll();
  showPanel("mid");
  save();
})();
</script>
</body>
</html>
